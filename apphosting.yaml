# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
# SECURITY NOTE: Never commit real private keys here. Use Firebase Secret Manager
# for FIREBASE_PRIVATE_KEY in production by replacing `value:` with `secret:`.
# See: https://firebase.google.com/docs/app-hosting/configure#secret-parameters
env:
  # ── Email (SMTP) ────────────────────────────────────────────────────────────
  - variable: SMTP_HOST
    value: smtp.gmail.com
  - variable: SMTP_PORT
    value: "587"
  - variable: SMTP_USER
    value: bomemebo6996@gmail.com
  - variable: SMTP_PASS
    secret: smtp_pass
    availability:
      - BUILD
      - RUNTIME
  - variable: SMTP_FROM
    value: '"BeastCode" <bomemebo6996@gmail.com>'

  # ── Site URL (used in password reset email links) ───────────────────────────
  - variable: NEXT_PUBLIC_SITE_URL
    value: "https://www.bomboclatbeastcode.codes"

  # ── Firebase Admin SDK (Service Account) ────────────────────────────────────
  # These power getUserByEmail, updateUser, and revokeRefreshTokens.
  # FIREBASE_PRIVATE_KEY should be stored as a Firebase Secret Manager secret.
  - variable: FIREBASE_PROJECT_ID
    value: beastcode-7555e
  - variable: FIREBASE_CLIENT_EMAIL
    secret: firebase_client_email
    availability:
      - BUILD
      - RUNTIME
  - variable: FIREBASE_PRIVATE_KEY
    secret: firebase_private_key
    availability:
      - BUILD
      - RUNTIME
